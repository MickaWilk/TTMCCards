<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTMC Cards — Générateur de cartes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div class="app">
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <h1 class="sidebar-title">TTMC<br><span>Cards</span></h1>
      <p class="sidebar-sub">Générateur de cartes personnalisées</p>

      <div class="sidebar-sections">
        <!-- Section: Couleur -->
        <div class="sidebar-section open">
          <div class="section-header">Couleur du thème</div>
          <div class="section-body">
            <div id="color-picker"></div>
          </div>
        </div>

        <!-- Section: Typographie -->
        <div class="sidebar-section">
          <div class="section-header">Typographie</div>
          <div class="section-body">
            <div class="controls-row">
              <div id="font-select-wrap"></div>
            </div>
          </div>
        </div>

        <!-- Section: Taille du texte -->
        <div class="sidebar-section">
          <div class="section-header">Taille du texte</div>
          <div class="section-body">
            <div class="size-control" id="font-size-controls"></div>
          </div>
        </div>

        <!-- Section: Icône -->
        <div class="sidebar-section">
          <div class="section-header">Icône</div>
          <div class="section-body">
            <div id="icon-picker"></div>
          </div>
        </div>

        <!-- Section: Logo personnalisé -->
        <div class="sidebar-section">
          <div class="section-header">Logo personnalisé</div>
          <div class="section-body">
            <div class="logo-area">
              <div class="logo-drop" id="logo-drop">
                <input type="file" id="logo-input" accept="image/*">
                <p>Glisser une image ou cliquer</p>
              </div>
              <div class="logo-preview-wrap" id="logo-preview-wrap" style="display:none">
                <img class="logo-preview" id="logo-preview-img">
                <span class="logo-preview-name" id="logo-preview-name"></span>
                <button class="logo-remove" id="logo-remove" title="Supprimer">&#10005;</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Section: Export -->
        <div class="sidebar-section">
          <div class="section-header">Taille d'export</div>
          <div class="section-body">
            <div class="controls-row">
              <div class="size-row">
                <input type="number" id="export-w" value="936" min="100" max="4000">
                <span class="sep">&times;</span>
                <input type="number" id="export-h" value="735" min="100" max="4000">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Boutons d'action -->
      <div class="btn-group">
        <button id="btn-export" class="btn btn-primary">Exporter PNG</button>
        <button id="btn-sample" class="btn btn-secondary">Charger un exemple</button>
        <button id="btn-reset" class="btn btn-secondary">Réinitialiser</button>
      </div>

      <div class="sidebar-footer">
        <p>Texte éditable directement sur la carte</p>
        <p>Double-cliquer sur le .html pour ouvrir</p>
      </div>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main">
      <div id="card-wrapper">
        <div id="card-preview" class="ttmc-card"></div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Sample Modal -->
  <div id="sample-modal"></div>

  <!-- Scripts : ordre de chargement obligatoire -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="src/icons.js"></script>
  <script src="src/themes.js"></script>
  <script src="src/fonts.js"></script>
  <script src="src/sample-cards.js"></script>
  <script src="src/cards.js"></script>
  <script src="src/export.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
